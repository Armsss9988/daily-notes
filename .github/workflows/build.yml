name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: Daily-Notes-win32-x64
          path: release/Daily Notes*.exe
